concepts:

  vertical_moving_passenger_bridge:
    canonical_name: "vertical moving passenger bridge"
    type: "system"
    synonyms:
      - "vertical moving bridge"
      - "vertical passenger bridge"
      - "passenger boarding bridge"
      - "bridge on vertical reciprocating conveyor"
      - "vertical reciprocating bridge"

  vertical_reciprocating_conveyor:
    canonical_name: "vertical reciprocating conveyor"
    type: "motion_subsystem"
    synonyms:
      - "vertical lift"
      - "lifting mechanism"
      - "VRC"
      - "reciprocating conveyor"
    properties:
      - moving_part
      - vertical_motion
      - hazardous_movement
      - crushing_zone
      - shearing_zone
    implied_facts:
      - relation: "has_property"
        object: "moving_part"
      - relation: "has_property"
        object: "hazardous_movement"
      - relation: "creates_hazard_zone"
        object: "crushing_zone"
      - relation: "creates_hazard_zone"
        object: "shearing_zone"

  elevated_platform:
    canonical_name: "elevated platform"
    type: "structure"
    synonyms:
      - "bridge platform"
      - "walking platform"
      - "passenger platform"
    properties:
      - user_accessible
      - carries_persons
      - elevated
    implied_facts:
      - relation: "has_property"
        object: "fall_from_height_relevant"
      - relation: "has_property"
        object: "human_access"

  fall_edge:
    canonical_name: "fall edge"
    type: "geometry"
    synonyms:
      - "open edge"
      - "platform edge"
      - "gap"
      - "transition gap"
    properties:
      - fall_edge
      - human_access
    implied_facts:
      - relation: "may_cause"
        object: "fall_from_height"

  guide_rail:
    canonical_name: "guide rail"
    type: "mechanical_structure"
    synonyms:
      - "rail"
      - "guide column"
      - "guide frame"
    properties:
      - fixed_structure
      - pinch_point

  electric_actuator:
    canonical_name: "electric actuator"
    type: "actuator"
    synonyms:
      - "motor"
      - "drive motor"
      - "electric motor"
      - "linear actuator"
      - "hydraulic actuator"
    properties:
      - moving_part
      - mechanical_energy
      - possible_ignition_source
    implied_facts:
      - relation: "has_property"
        object: "moving_part"
      - relation: "has_property"
        object: "mechanical_energy"
      - relation: "has_property"
        object: "possible_ignition_source"

  electrical_control_cabinet:
    canonical_name: "electrical control cabinet"
    type: "electrical_subsystem"
    synonyms:
      - "control cabinet"
      - "motor controller"
      - "drive controller"
      - "electrical cabinet"
    properties:
      - electrical_energy
      - possible_ignition_source
    implied_facts:
      - relation: "has_property"
        object: "electrical_energy"
      - relation: "has_property"
        object: "possible_ignition_source"

  hazardous_voltage_supply:
    canonical_name: "hazardous voltage supply"
    type: "energy_source"
    synonyms:
      - "mains supply"
      - "400 V supply"
      - "230 V supply"
      - "220 V supply"
      - "high voltage supply"
    properties:
      - hazardous_voltage
      - electric_shock_potential
    implied_facts:
      - relation: "has_property"
        object: "hazardous_voltage"
      - relation: "may_cause"
        object: "electric_shock"

  plastic_material:
    canonical_name: "plastic material"
    type: "material"
    synonyms:
      - "plastic"
      - "polymer"
      - "plastic cover"
      - "plastic cable tray"
    properties:
      - combustible_material
    implied_facts:
      - relation: "has_property"
        object: "combustible_material"

  human:
    canonical_name: "human"
    type: "actor"
    synonyms:
      - "passenger"
      - "operator"
      - "technician"
      - "maintenance staff"
      - "user"
    properties:
      - human
      - human_access

  access_gate:
    canonical_name: "access gate"
    type: "guard"
    synonyms:
      - "gate"
      - "landing gate"
      - "door"
      - "barrier"
      - "guard"
    properties:
      - guard
    implied_facts:
      - relation: "has_property"
        object: "guard"

  presence_sensor:
    canonical_name: "presence sensor"
    type: "protective_device"
    synonyms:
      - "light curtain"
      - "presence detection"
      - "obstruction sensor"
      - "safety sensor"
      - "proximity sensor"
    properties:
      - protective_device
      - detection_function

  emergency_stop:
    canonical_name: "emergency stop"
    type: "safety_control"
    synonyms:
      - "E-stop"
      - "emergency stop button"
      - "emergency stop device"
    properties:
      - safety_control

  rain_possible:
    canonical_name: "rain possible"
    type: "environmental_condition"
    properties:
      - moisture_possible

  moisture_possible:
    canonical_name: "moisture possible"
    type: "environmental_condition"
    properties:
      - moisture

generic_properties:
  - hazardous_voltage
  - electric_shock_potential
  - combustible_material
  - possible_ignition_source
  - high_temperature
  - moving_part
  - hazardous_movement
  - crushing_zone
