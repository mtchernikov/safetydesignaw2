meta:
  version: "0.2"
  name: "Standards catalogue — Vertical Moving Bridge PoC"
  purpose: >
    Deterministic catalogue for potentially relevant norms, regulations and
    standards for a vertical moving passenger bridge / bridge on a vertical
    reciprocating conveyor. Norms are resolved from matched generic hazard
    template IDs. The LLM must not invent standards.
  important_note: >
    This catalogue provides early design awareness only. Final applicability
    depends on intended use, market, installation location, product type,
    passenger/worker scope, aviation/airport context, lifting-table scope,
    machinery classification, and national legal requirements.

relation_levels:
  primary: "Main framework or central standard likely relevant to the hazard and system context."
  conditional: "Relevant if the product scope or design detail confirms the applicability condition."
  supporting_evidence: "Useful for evidence, testing or design detail, but not sufficient as the main applicability basis."
  related_but_insufficient: "Related topic, but not enough alone to establish applicability."

